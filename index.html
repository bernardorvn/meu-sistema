<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS FINANCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0;
            --primary: #4f46e5; --success: #10b981; --danger: #ef4444; 
            --warning: #f59e0b; --text-main: #0f172a; --text-sub: #64748b; --savings: #db2777;
        }

        * { box-sizing: border-box; font-size: 14px; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* HEADER */
        .app-header { 
            display: none;
            align-items: center; 
            padding: 12px 15px; 
            background: var(--card-bg); 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-main); margin-right: 15px; }
        .app-logo { font-weight: 800; color: var(--primary); font-size: 16px; letter-spacing: -0.5px; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 200; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 25px 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150;
            display: none; backdrop-filter: blur(2px);
        }
        .sidebar-overlay.active { display: block; }

        .nav-list { list-style: none; margin-top: 35px; }
        .nav-item { 
            padding: 12px 15px; border-radius: 12px; margin-bottom: 5px; 
            cursor: pointer; font-weight: 600; color: var(--text-sub);
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .nav-item span.bullet { font-size: 18px; color: var(--border); }
        .nav-item.active { background: #eef2ff; color: var(--primary); }
        
        /* CONTEÚDO */
        .view-container { padding: 12px; max-width: 800px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        .card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; }
        
        /* Layout Vertical solicitado */
        .grid-layout { display: flex; flex-direction: column; gap: 10px; }
        
        /* Estilo para as somas dos cartões abaixo do form */
        .cards-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 5px; }
        .card-total-box { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .card-total-box h4 { font-size: 12px; color: var(--primary); margin-bottom: 5px; }
        .card-total-box p { font-size: 16px; font-weight: 800; }

        .resumo-pessoas { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; padding-bottom: 5px; }
        .pessoa-tag { background: #f1f5f9; padding: 6px 12px; border-radius: 10px; border: 1px solid var(--border); white-space: nowrap; font-size: 12px; }

        input, select { 
            width: 100%; height: 45px; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); 
            margin-bottom: 10px; font-size: 15px; outline: none; background: #fff; appearance: none;
        }
        
        .botao { background: var(--primary); color: white; border: none; height: 45px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; }
        .botao:active { transform: scale(0.98); }
        
        .gasto-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card-bg); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); }
        .btn-acao { background: none; border: none; cursor: pointer; font-size: 16px; margin-left: 8px; padding: 4px; }
        
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .parcela-box { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px dashed var(--border); margin-bottom: 10px; display: none; }
        .data-separador { font-size: 11px; font-weight: 800; color: var(--text-sub); padding: 15px 0 5px 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="tela-auth" class="auth-overlay">
        <div class="card" style="width: 100%; max-width: 360px; text-align: center;">
            <h2 style="font-weight: 800; color: var(--primary); margin-bottom: 20px;">NEXUS FINANCE</h2>
            <div id="box-login">
                <input type="text" id="usuario" placeholder="Usuário">
                <input type="password" id="senha" placeholder="Senha">
                <button class="botao" onclick="fazerLogin()">Entrar</button>
                <p onclick="toggleAuth(true)" style="margin-top:20px; cursor:pointer; color: var(--text-sub);">Cadastre-se</p>
            </div>
            <div id="box-cad" style="display:none">
                <input type="text" id="cad-user" placeholder="Novo Usuário">
                <input type="password" id="cad-pass" placeholder="Senha">
                <button class="botao" style="background:var(--success)" onclick="registrar()">Criar Conta</button>
                <p onclick="toggleAuth(false)" style="margin-top:20px; cursor:pointer; color: var(--text-sub);">Voltar ao login</p>
            </div>
        </div>
    </div>

    <header class="app-header" id="app-header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="app-logo">NEXUS FINANCE</div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="app-logo">NEXUS</div>
            <button class="menu-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <nav class="nav-list">
            <div class="nav-item active" id="btn-home" onclick="switchTab('home')"><span class="bullet">•</span> Início</div>
            <div class="nav-item" id="btn-cartoes" onclick="switchTab('cartoes')"><span class="bullet">•</span> Cartões</div>
            <div class="nav-item" id="btn-fixas" onclick="switchTab('fixas')"><span class="bullet">•</span> Contas Fixas</div>
            <div class="nav-item" id="btn-poupanca" onclick="switchTab('poupanca')"><span class="bullet">•</span> <span style="color:var(--savings)">Poupança</span></div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
            <div class="nav-item" onclick="location.reload()" style="color:var(--danger)"><span class="bullet" style="color:var(--danger)">•</span> Sair</div>
        </nav>
    </aside>

    <main class="view-container" id="main-app" style="display: none;">
        <div id="view-home" class="view active">
            <div class="card" style="border:none; background:transparent; padding:5px 0">
                <h2 id="msg-boas-vindas" style="font-size:18px; color:var(--text-sub)">Olá, <b>...</b></h2>
            </div>
            <div id="alertas-vencimento" class="card" style="display:none; border-left: 5px solid var(--warning); background: #fffbeb;">
                <strong style="color: #92400e; font-size: 12px;">⚠️ Vencendo em breve:</strong>
                <ul id="lista-alertas" style="margin-top: 5px; color: #b45309; padding-left: 18px; font-size: 13px;"></ul>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="card" style="text-align:center; padding: 12px;">
                    <span style="color: var(--text-sub); font-size: 10px; font-weight: 700;">ORÇAMENTO</span>
                    <p id="h-saldo-total" style="font-size:20px; font-weight:800; margin:5px 0">R$ 0,00</p>
                    <button class="botao" onclick="editarSaldoMensal()" style="height: 25px; font-size: 10px; background: #f1f5f9; color: var(--primary); width: auto; padding: 0 10px;">✎ Editar</button>
                </div>
                <div class="card" style="text-align:center; padding: 12px;">
                    <span style="color: var(--text-sub); font-size: 10px; font-weight: 700;">DISPONÍVEL</span>
                    <p id="h-sobra" style="font-size:20px; font-weight:800; margin:5px 0">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div id="view-cartoes" class="view">
            <div class="grid-layout">
                <div class="card">
                    <h3 style="margin-bottom: 15px;">Novo Gasto</h3>
                    <input type="hidden" id="edit-index-gasto" value="-1">
                    <input type="text" id="f-local" placeholder="Onde?">
                    <input type="number" id="f-valor" placeholder="Valor Total">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" id="f-is-parcelado" onchange="toggleParcelas()" style="width: 20px; height: 20px; margin: 0;">
                        <label for="f-is-parcelado" style="font-weight: 600; color: var(--text-sub);">Parcelado?</label>
                    </div>
                    <div class="parcela-box" id="box-parcelas">
                        <input type="number" id="f-parcelas" value="1" min="1" placeholder="Nº de parcelas">
                    </div>
                    <div style="display:flex; gap: 8px;">
                        <select id="f-cartao-select" style="flex: 1;"></select>
                        <button class="botao" style="width: 45px;" onclick="novoBanco()">+</button>
                    </div>
                    <input type="text" id="f-pessoa" placeholder="Quem comprou?">
                    <input type="date" id="f-data">
                    <button class="botao" onclick="addGasto()">Salvar Compra</button>
                </div>
                
                <div id="cards-summary" class="cards-summary"></div>
                
                <div class="resumo-pessoas" id="resumo-por-pessoa"></div>
                <div id="lista-financas"></div>
            </div>
        </div>

        <div id="view-fixas" class="view">
            <div class="grid-layout">
                <div class="card">
                    <h3 style="margin-bottom: 15px;">Conta Fixa</h3>
                    <input type="hidden" id="edit-index-fixa" value="-1">
                    <input type="text" id="fixa-nome" placeholder="Nome">
                    <input type="number" id="fixa-valor" placeholder="Valor">
                    <input type="date" id="fixa-vencimento">
                    <button class="botao" onclick="addContaFixa()" style="background:var(--success)">Salvar Fixa</button>
                </div>
                <section id="lista-fixas"></section>
            </div>
        </div>

        <div id="view-poupanca" class="view">
            <div class="grid-layout">
                <div class="card" style="text-align:center; border-top: 4px solid var(--savings);">
                    <span style="color:var(--savings); font-weight:800; font-size: 11px;">RESERVA TOTAL</span>
                    <p id="p-total" style="font-size:30px; font-weight:800; margin:5px 0">R$ 0,00</p>
                    <button class="botao" style="background:transparent; color:var(--danger); height: auto; padding: 0; font-size: 11px;" onclick="zerarPoupanca()">Zerar Histórico</button>
                </div>
                <div class="card">
                    <input type="number" id="p-valor" placeholder="Valor">
                    <div style="display:flex; gap:8px;">
                        <button class="botao" style="background:var(--success)" onclick="movimentarPoupanca('entrada')">Guardar</button>
                        <button class="botao" style="background:var(--danger)" onclick="movimentarPoupanca('saida')">Retirar</button>
                    </div>
                </div>
                <div id="lista-poupanca"></div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgUHntWb0V0l6MoHJVxDMs5sstPSaH-lc",
            authDomain: "sistema-bernardo-1999.firebaseapp.com",
            projectId: "sistema-bernardo-1999",
            databaseURL: "https://sistema-bernardo-1999-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userLogado = "", dados = {};

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('active'); }
        function toggleAuth(isCad) { document.getElementById('box-login').style.display = isCad ? 'none' : 'block'; document.getElementById('box-cad').style.display = isCad ? 'block' : 'none'; }
        function toggleParcelas() { document.getElementById('box-parcelas').style.display = document.getElementById('f-is-parcelado').checked ? 'block' : 'none'; }

        function fazerLogin() {
            const u = document.getElementById('usuario').value.toLowerCase().trim();
            const s = document.getElementById('senha').value;
            db.ref('/').once('value', snap => {
                dados = snap.val() || {};
                if (dados.usuarios && dados.usuarios[u] && dados.usuarios[u].senha === s) {
                    userLogado = u;
                    document.getElementById('tela-auth').style.display = "none";
                    document.getElementById('app-header').style.display = "flex";
                    document.getElementById('main-app').style.display = "block";
                    db.ref('/').on('value', s => { dados = s.val(); renderTudo(); });
                } else { alert("Erro!"); }
            });
        }

        function registrar() {
            const u = document.getElementById('cad-user').value.toLowerCase().trim();
            const s = document.getElementById('cad-pass').value;
            if(u && s) db.ref(`usuarios/${u}`).set({ senha: s, saldoMensal: 0, cartoes: ["Nubank"] }).then(() => toggleAuth(false));
        }

        function switchTab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            window.scrollTo(0,0);
        }

        function novoBanco() {
            const b = prompt("Nome do banco:");
            if(b) {
                let list = dados.usuarios[userLogado].cartoes || [];
                list.push(b);
                db.ref(`usuarios/${userLogado}/cartoes`).set(list);
            }
        }

        function addGasto() {
            const idx = parseInt(document.getElementById('edit-index-gasto').value);
            const total = parseFloat(document.getElementById('f-valor').value);
            if(isNaN(total)) return;
            const parc = document.getElementById('f-is-parcelado').checked ? (parseInt(document.getElementById('f-parcelas').value) || 1) : 1;
            let list = dados.usuarios[userLogado].financas || [];
            const obj = { 
                local: document.getElementById('f-local').value || "Gasto", 
                valor: total / parc, 
                valorTotal: total,
                parcelas: parc,
                pessoa: document.getElementById('f-pessoa').value || "Eu", 
                cartao: document.getElementById('f-cartao-select').value, 
                data: document.getElementById('f-data').value || new Date().toISOString().split('T')[0]
            };
            if(idx === -1) list.push(obj); else list[idx] = obj;
            db.ref(`usuarios/${userLogado}/financas`).set(list).then(() => {
                document.getElementById('f-local').value = ""; document.getElementById('f-valor').value = ""; 
                document.getElementById('edit-index-gasto').value = "-1";
                document.getElementById('f-is-parcelado').checked = false; toggleParcelas();
            });
        }

        function addContaFixa() {
            const idx = parseInt(document.getElementById('edit-index-fixa').value);
            let list = dados.usuarios[userLogado].fixas || [];
            const obj = { nome: document.getElementById('fixa-nome').value, valor: parseFloat(document.getElementById('fixa-valor').value), vencimento: document.getElementById('fixa-vencimento').value };
            if(idx === -1) list.push(obj); else list[idx] = obj;
            db.ref(`usuarios/${userLogado}/fixas`).set(list);
        }

        function movimentarPoupanca(tipo) {
            const v = parseFloat(document.getElementById('p-valor').value);
            if(isNaN(v)) return;
            let list = dados.usuarios[userLogado].poupanca_extrato || [];
            list.push({ tipo, valor: v, data: new Date().toISOString() });
            db.ref(`usuarios/${userLogado}/poupanca_extrato`).set(list);
            document.getElementById('p-valor').value = "";
        }

        function delGasto(i) { if(confirm('Excluir?')) { let f = [...dados.usuarios[userLogado].financas]; f.splice(i,1); db.ref(`usuarios/${userLogado}/financas`).set(f); } }
        function delFixa(i) { if(confirm('Excluir?')) { let f = [...dados.usuarios[userLogado].fixas]; f.splice(i,1); db.ref(`usuarios/${userLogado}/fixas`).set(f); } }
        function editarSaldoMensal() { const n = prompt("Novo orçamento:"); if(n) db.ref(`usuarios/${userLogado}/saldoMensal`).set(parseFloat(n)); }
        function zerarPoupanca() { if(confirm("Zerar?")) db.ref(`usuarios/${userLogado}/poupanca_extrato`).set([]); }
        
        function prepararEdicaoGasto(i) {
            const g = dados.usuarios[userLogado].financas[i];
            document.getElementById('edit-index-gasto').value = i;
            document.getElementById('f-local').value = g.local;
            document.getElementById('f-valor').value = g.valorTotal || g.valor;
            document.getElementById('f-parcelas').value = g.parcelas || 1;
            document.getElementById('f-is-parcelado').checked = (g.parcelas > 1);
            toggleParcelas();
            document.getElementById('f-pessoa').value = g.pessoa;
            document.getElementById('f-data').value = g.data;
            switchTab('cartoes');
        }

        function renderTudo() {
            const u = dados.usuarios[userLogado];
            if(!u) return;
            document.getElementById('msg-boas-vindas').innerHTML = `Olá, <b>${userLogado}</b>`;
            
            let totalG = 0, gastosPessoa = {}, gastosCartao = {};
            (u.financas || []).forEach(g => { 
                totalG += g.valor; 
                gastosPessoa[g.pessoa] = (gastosPessoa[g.pessoa] || 0) + g.valor;
                gastosCartao[g.cartao] = (gastosCartao[g.cartao] || 0) + g.valor;
            });

            let totalF = 0, alertas = "";
            (u.fixas || []).forEach(f => {
                totalF += f.valor;
                const dv = new Date(f.vencimento + "T12:00:00"), hoje = new Date();
                const diff = (dv - hoje) / (1000 * 60 * 60 * 24);
                if(diff <= 10 && diff >= -1) alertas += `<li>${f.nome} (${dv.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})})</li>`;
            });

            document.getElementById('h-saldo-total').innerText = `R$ ${(u.saldoMensal || 0).toFixed(2)}`;
            const sobra = (u.saldoMensal || 0) - totalG - totalF;
            document.getElementById('h-sobra').innerText = `R$ ${sobra.toFixed(2)}`;
            document.getElementById('h-sobra').style.color = sobra < 0 ? 'var(--danger)' : 'var(--success)';
            document.getElementById('alertas-vencimento').style.display = alertas ? "block" : "none";
            document.getElementById('lista-alertas').innerHTML = alertas;

            const bancos = u.cartoes || ['Nubank'];
            document.getElementById('f-cartao-select').innerHTML = bancos.map(b => `<option value="${b}">${b}</option>`).join('');
            
            // Renderiza as somas dos cartões como caixas simples (conforme as imagens)
            document.getElementById('cards-summary').innerHTML = bancos.map(b => `
                <div class="card-total-box">
                    <h4>${b}</h4>
                    <p>R$ ${(gastosCartao[b] || 0).toFixed(2)}</p>
                </div>
            `).join('');

            document.getElementById('resumo-por-pessoa').innerHTML = Object.keys(gastosPessoa).map(p => `<div class="pessoa-tag">${p}: <b>R$ ${gastosPessoa[p].toFixed(2)}</b></div>`).join('');

            let htmlG = "", dataAt = "";
            const sortedG = [...(u.financas || [])].sort((a,b) => new Date(b.data) - new Date(a.data));
            sortedG.forEach((g) => {
                const dt = new Date(g.data + "T12:00:00").toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
                if(dt !== dataAt) { htmlG += `<div class="data-separador">${dt}</div>`; dataAt = dt; }
                htmlG += `<div class="gasto-item">
                    <span><b>${g.local}</b><br><small>${g.cartao} • ${g.pessoa} ${g.parcelas > 1 ? `(${g.parcelas}x)` : ''}</small></span>
                    <div style="text-align:right"><b>R$ ${g.valor.toFixed(2)}</b><br>
                    <button class="btn-acao" style="color:var(--primary)" onclick="prepararEdicaoGasto(${u.financas.indexOf(g)})">✎</button>
                    <button class="btn-acao" style="color:var(--danger)" onclick="delGasto(${u.financas.indexOf(g)})">✕</button></div>
                </div>`;
            });
            document.getElementById('lista-financas').innerHTML = htmlG;

            document.getElementById('lista-fixas').innerHTML = (u.fixas || []).map((f,i) => `
                <div class="gasto-item">
                    <span><b>${f.nome}</b><br><small>Venc: ${new Date(f.vencimento+"T12:00:00").toLocaleDateString('pt-BR')}</small></span>
                    <div style="text-align:right"><b>R$ ${f.valor.toFixed(2)}</b><button class="btn-acao" style="color:var(--danger)" onclick="delFixa(${i})">✕</button></div>
                </div>`).join('');

            let tP = 0;
            document.getElementById('lista-poupanca').innerHTML = (u.poupanca_extrato || []).map(m => {
                tP += (m.tipo==='entrada'? m.valor : -m.valor);
                return `<div class="gasto-item"><span>${m.tipo==='entrada'?'📥 Guardado':'📤 Retirado'}</span><b>R$ ${m.valor.toFixed(2)}</b></div>`;
            }).reverse().join('');
            document.getElementById('p-total').innerText = `R$ ${tP.toFixed(2)}`;
        }
    </script>
</body>
</html>
