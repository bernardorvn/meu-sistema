<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS FINANCE - Estável</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --card-bg: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --success: #10b981; --danger: #f43f5e; --text: #f1f5f9;
        }

        * { box-sizing: border-box; font-size: 13px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; margin: 0; overflow: hidden; }

        /* Navegação */
        .nav-tabs { display: flex; justify-content: center; gap: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--text); opacity: 0.5; cursor: pointer; font-weight: 700; transition: 0.3s; padding: 5px 15px; border-radius: 8px; }
        .tab-btn.active { opacity: 1; color: var(--primary); background: rgba(99, 102, 241, 0.1); }

        .view-container { padding: 20px; height: calc(100vh - 65px); overflow-y: auto; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        /* Cards e Layout */
        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        .grid-home { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .big-stat { text-align: center; padding: 30px; }
        .big-stat h2 { font-size: 11px; opacity: 0.6; margin-bottom: 5px; }
        .big-stat p { font-size: 36px; font-weight: 800; margin: 0; }

        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; margin-bottom: 10px; }
        .botao { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }

        /* Dashboard Ajustado */
        .dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 15px; height: 100%; }
        .charts-wrapper { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 10px; margin-bottom: 15px; max-height: 200px; 
        }
        .chart-container { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 10px; border: 1px solid var(--border); height: 180px; }
        
        .history-list { overflow-y: auto; height: calc(100% - 215px); }
        .gasto-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
        
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="tela-auth" class="auth-overlay">
        <div class="card" style="width: 320px;">
            <h2 style="text-align: center; margin-bottom: 20px;">NEXUS FINANCE</h2>
            <div id="auth-box">
                <input type="text" id="usuario" placeholder="Usuário">
                <input type="password" id="senha" placeholder="Senha">
                <button class="botao" onclick="fazerLogin()">Entrar</button>
                <p onclick="document.getElementById('auth-box').style.display='none'; document.getElementById('reg-box').style.display='block'" style="text-align:center; cursor:pointer; font-size:11px; margin-top:15px; opacity:0.6">Criar nova conta</p>
            </div>
            <div id="reg-box" style="display:none">
                <input type="text" id="cad-user" placeholder="Novo Usuário">
                <input type="password" id="cad-senha" placeholder="Senha">
                <button class="botao" style="background:var(--success)" onclick="registrarUsuario()">Cadastrar</button>
                <p onclick="document.getElementById('auth-box').style.display='block'; document.getElementById('reg-box').style.display='none'" style="text-align:center; cursor:pointer; font-size:11px; margin-top:15px; opacity:0.6">Voltar</p>
            </div>
        </div>
    </div>

    <nav class="nav-tabs" id="nav-app" style="display: none;">
        <button class="tab-btn active" onclick="switchTab('home')">Início</button>
        <button class="tab-btn" onclick="switchTab('cartoes')">Cartões</button>
        <button class="tab-btn" onclick="switchTab('fixas')">Contas Fixas</button>
        <button class="tab-btn" onclick="location.reload()" style="color:var(--danger)">Sair</button>
    </nav>

    <main class="view-container" id="main-app" style="display: none;">
        
        <div id="view-home" class="view active">
            <div class="grid-home">
                <div class="card big-stat">
                    <h2>SALDO DO MÊS</h2>
                    <p id="h-saldo-total" style="color: var(--success);">R$ 0,00</p>
                    <button onclick="editarSaldoMensal()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:10px">✎ Editar Saldo</button>
                </div>
                <div class="card big-stat">
                    <h2>SOBRANDO</h2>
                    <p id="h-sobra">R$ 0,00</p>
                </div>
            </div>
            <div class="card">
                <h3>Resumo de Contas Fixas</h3>
                <p id="resumo-fixas" style="opacity: 0.6;">Carregando...</p>
            </div>
        </div>

        <div id="view-cartoes" class="view">
            <div class="dashboard-layout">
                <aside class="card">
                    <h3>Novo Lançamento</h3>
                    <input type="text" id="f-local" placeholder="Onde?">
                    <input type="number" id="f-valor" placeholder="Valor R$">
                    <input type="date" id="f-data">
                    <select id="f-cartao-select"></select>
                    <button class="botao" onclick="addGasto()">Lançar</button>
                    <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:10px">
                        <input type="text" id="novo-banco" placeholder="Novo Banco">
                        <button class="botao" style="background:#334155" onclick="addBanco()">+ Adicionar Banco</button>
                    </div>
                </aside>
                
                <section style="overflow:hidden">
                    <div class="charts-wrapper" id="container-graficos"></div>
                    <div class="card history-list" id="lista-financas"></div>
                </section>
            </div>
        </div>

        <div id="view-fixas" class="view">
            <div class="grid-home">
                <div class="card">
                    <h3>Adicionar Fixa</h3>
                    <input type="text" id="fixa-nome" placeholder="Nome (Ex: Aluguel)">
                    <input type="number" id="fixa-valor" placeholder="Valor R$">
                    <button class="botao" style="background:var(--success)" onclick="addContaFixa()">Salvar</button>
                </div>
                <div class="card">
                    <h3>Lista de Contas Fixas</h3>
                    <div id="lista-fixas"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgUHntWb0V0l6MoHJVxDMs5sstPSaH-lc",
            authDomain: "sistema-bernardo-1999.firebaseapp.com",
            projectId: "sistema-bernardo-1999",
            storageBucket: "sistema-bernardo-1999.firebasestorage.app",
            messagingSenderId: "1071659920638",
            appId: "1:1071659920638:web:f8843b1886ff698acf49af",
            databaseURL: "https://sistema-bernardo-1999-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userLogado = "", dados = {};

        // Sincronização em tempo real COM carregamento inicial forçado
        function iniciarSync() {
            db.ref('/').on('value', snap => {
                dados = snap.val() || {};
                renderTudo();
            });
        }

        function fazerLogin() {
            const u = document.getElementById('usuario').value.toLowerCase().trim();
            const s = document.getElementById('senha').value;
            // Busca os dados antes de validar para garantir que não venha vazio
            db.ref('/').once('value', snap => {
                dados = snap.val() || {};
                if (dados.usuarios && dados.usuarios[u] && dados.usuarios[u].senha === s) {
                    userLogado = u;
                    document.getElementById('tela-auth').style.display = "none";
                    document.getElementById('nav-app').style.display = "flex";
                    document.getElementById('main-app').style.display = "block";
                    document.getElementById('f-data').valueAsDate = new Date();
                    iniciarSync(); // Ativa o modo em tempo real após o login
                } else { alert("Login incorreto!"); }
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function editarSaldoMensal() {
            const atual = dados.usuarios[userLogado].saldoMensal || 0;
            const novo = prompt("Novo Saldo Mensal:", atual);
            if(novo !== null) db.ref(`usuarios/${userLogado}/saldoMensal`).set(parseFloat(novo));
        }

        function addGasto() {
            const l = document.getElementById('f-local').value, v = parseFloat(document.getElementById('f-valor').value);
            const d = document.getElementById('f-data').value, c = document.getElementById('f-cartao-select').value;
            if(!l || isNaN(v)) return;
            let f = dados.usuarios[userLogado].financas || [];
            f.push({ local: l, valor: v, data: d, cartao: c });
            db.ref(`usuarios/${userLogado}/financas`).set(f);
            document.getElementById('f-local').value = ""; document.getElementById('f-valor').value = "";
        }

        function editarGasto(idx) {
            let f = dados.usuarios[userLogado].financas;
            const novo = prompt("Novo valor para " + f[idx].local, f[idx].valor);
            if(novo !== null) { f[idx].valor = parseFloat(novo); db.ref(`usuarios/${userLogado}/financas`).set(f); }
        }

        function addContaFixa() {
            const n = document.getElementById('fixa-nome').value, v = parseFloat(document.getElementById('fixa-valor').value);
            if(!n || isNaN(v)) return;
            let fx = dados.usuarios[userLogado].fixas || [];
            fx.push({ nome: n, valor: v });
            db.ref(`usuarios/${userLogado}/fixas`).set(fx);
            document.getElementById('fixa-nome').value = ""; document.getElementById('fixa-valor').value = "";
        }

        function addBanco() {
            const n = document.getElementById('novo-banco').value.trim();
            if(!n) return;
            let c = dados.usuarios[userLogado].cartoes || [];
            c.push(n);
            db.ref(`usuarios/${userLogado}/cartoes`).set(c);
            document.getElementById('novo-banco').value = "";
        }

        function registrarUsuario() {
            const u = document.getElementById('cad-user').value.toLowerCase().trim();
            const s = document.getElementById('cad-senha').value;
            if(!u || !s) return;
            db.ref('usuarios/' + u).set({ senha: s, saldoMensal: 0, cartoes: ['Nubank'], financas: [], fixas: [] });
            alert("Conta criada!"); location.reload();
        }

        function renderTudo() {
            const user = dados.usuarios[userLogado];
            if(!user) return;
            const saldoM = user.saldoMensal || 0;
            let totalG = 0, totalF = 0;

            (user.financas || []).forEach(g => totalG += g.valor);
            (user.fixas || []).forEach(f => totalF += f.valor);

            document.getElementById('h-saldo-total').innerText = `R$ ${saldoM.toFixed(2)}`;
            const sobra = saldoM - totalG - totalF;
            const sEl = document.getElementById('h-sobra');
            sEl.innerText = `R$ ${sobra.toFixed(2)}`;
            sEl.style.color = sobra < 0 ? 'var(--danger)' : 'var(--success)';
            document.getElementById('resumo-fixas').innerText = `Total em contas fixas: R$ ${totalF.toFixed(2)}`;

            const containerG = document.getElementById('container-graficos');
            containerG.innerHTML = "";
            const bancos = user.cartoes || [];
            document.getElementById('f-cartao-select').innerHTML = bancos.map(b => `<option value="${b}">${b}</option>`).join('');

            bancos.forEach(b => {
                const gastosB = (user.financas || []).filter(g => g.cartao === b);
                if(gastosB.length === 0) return;
                const resumo = {}; gastosB.forEach(g => resumo[g.local] = (resumo[g.local] || 0) + g.valor);
                
                const div = document.createElement('div');
                div.className = 'chart-container';
                div.innerHTML = `<h5 style="margin:0 0 5px 0; font-size:10px">${b}</h5><canvas id="c-${b}"></canvas>`;
                containerG.appendChild(div);

                new Chart(document.getElementById(`c-${b}`), {
                    type: 'doughnut',
                    data: { labels: Object.keys(resumo), datasets: [{ data: Object.values(resumo), backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#a855f7'], borderWidth: 0 }] },
                    options: { plugins: { legend: { display: false } }, cutout: '70%', maintainAspectRatio: false }
                });
            });

            document.getElementById('lista-financas').innerHTML = (user.financas || []).map((g, i) => `
                <div class="gasto-item">
                    <span><b>${g.cartao}</b> | ${g.local}</span>
                    <div>
                        <b style="color:var(--primary)">R$ ${g.valor.toFixed(2)}</b>
                        <button onclick="editarGasto(${i})" style="background:none; border:none; color:var(--text); cursor:pointer; margin-left:10px">✎</button>
                        <button onclick="if(confirm('Excluir?')){ let f=user.financas; f.splice(${i},1); db.ref('usuarios/${userLogado}/financas').set(f); }" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-left:5px">✕</button>
                    </div>
                </div>`).reverse().join('');

            document.getElementById('lista-fixas').innerHTML = (user.fixas || []).map((f, i) => `
                <div class="gasto-item">
                    <span>${f.nome}</span>
                    <b style="color:var(--danger)">R$ ${f.valor.toFixed(2)}</b>
                    <button onclick="if(confirm('Excluir?')){ let fx=user.fixas; fx.splice(${i},1); db.ref('usuarios/${userLogado}/fixas').set(fx); }" style="background:none; border:none; color:var(--danger); cursor:pointer">✕</button>
                </div>`).join('');
        }
    </script>
</body>
</html>
