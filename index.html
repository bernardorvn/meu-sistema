<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS FINANCE - V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617; --card-bg: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1; --success: #10b981; --danger: #f43f5e; --warning: #f59e0b; --text: #f1f5f9;
        }

        * { box-sizing: border-box; font-size: 12.5px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; margin: 0; overflow: hidden; }

        .nav-tabs { display: flex; justify-content: center; gap: 15px; padding: 12px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--text); opacity: 0.5; cursor: pointer; font-weight: 700; padding: 6px 12px; border-radius: 8px; }
        .tab-btn.active { opacity: 1; color: var(--primary); background: rgba(99, 102, 241, 0.1); }

        .view-container { padding: 15px; height: calc(100vh - 60px); overflow-y: auto; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        .card { background: var(--card-bg); border-radius: 18px; border: 1px solid var(--border); padding: 18px; margin-bottom: 12px; }
        .grid-layout { display: grid; grid-template-columns: 280px 1fr; gap: 15px; height: 100%; }
        
        .big-stat { text-align: center; padding: 25px; }
        .big-stat p { font-size: 32px; font-weight: 800; margin: 5px 0 0 0; }

        /* Ajuste do Calendário */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        input, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; margin-bottom: 8px; }
        .botao { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; }

        .charts-wrapper { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; padding-bottom: 5px; }
        .chart-container { min-width: 160px; flex: 1; background: rgba(255,255,255,0.02); border-radius: 12px; padding: 8px; border: 1px solid var(--border); height: 160px; text-align: center; }
        
        .history-list { overflow-y: auto; height: calc(100% - 185px); }
        .gasto-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; border: 1px solid var(--border); }
        
        .btn-icon { background:none; border:none; cursor:pointer; font-size: 14px; margin-left: 5px; transition: 0.2s; }
        .btn-icon:hover { opacity: 0.7; }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="tela-auth" class="auth-overlay">
        <div class="card" style="width: 300px;">
            <h2 style="text-align: center;">NEXUS FINANCE</h2>
            <input type="text" id="usuario" placeholder="Usuário">
            <input type="password" id="senha" placeholder="Senha">
            <button class="botao" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <nav class="nav-tabs" id="nav-app" style="display: none;">
        <button class="tab-btn active" onclick="switchTab('home')">Início</button>
        <button class="tab-btn" onclick="switchTab('cartoes')">Cartões</button>
        <button class="tab-btn" onclick="switchTab('fixas')">Contas Fixas</button>
        <button class="tab-btn" onclick="location.reload()" style="color:var(--danger)">Sair</button>
    </nav>

    <main class="view-container" id="main-app" style="display: none;">
        
        <div id="view-home" class="view active">
            <div id="alertas-vencimento" class="card" style="display:none; border-color: var(--warning); background: rgba(245,158,11,0.05);">
                <strong style="color: var(--warning)">⚠️ Contas Próximas ao Vencimento:</strong>
                <ul id="lista-alertas" style="margin: 10px 0 0 0; padding-left: 20px;"></ul>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="card big-stat">
                    <span style="opacity: 0.6;">SALDO MENSAL</span>
                    <p id="h-saldo-total" style="color: var(--success);">R$ 0,00</p>
                    <button onclick="editarSaldoMensal()" style="background:none; border:none; color:var(--primary); cursor:pointer;">✎ Editar Saldo</button>
                </div>
                <div class="card big-stat">
                    <span style="opacity: 0.6;">DISPONÍVEL</span>
                    <p id="h-sobra">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div id="view-cartoes" class="view">
            <div class="grid-layout">
                <aside class="card">
                    <h3>Novo Lançamento</h3>
                    <input type="text" id="f-local" placeholder="Onde?">
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" id="f-valor" placeholder="Valor da Compra" style="margin:0">
                        <input type="checkbox" id="check-parcela" onchange="document.getElementById('c-parc').style.display=this.checked?'block':'none'" style="width:15px; height:15px">
                        <label style="font-size: 9px;">Parc.</label>
                    </div>
                    <div id="c-parc" style="display:none; margin-top:5px">
                        <input type="number" id="f-qtd-parcelas" placeholder="Qtd. Parcelas" value="1">
                    </div>
                    <input type="text" id="f-pessoa" placeholder="Quem comprou?">
                    <input type="date" id="f-data">
                    <select id="f-cartao-select"></select>
                    <button class="botao" onclick="addGasto()">Salvar Gasto</button>
                    
                    <div style="margin-top:15px; border-top: 1px solid var(--border); padding-top:10px">
                        <input type="text" id="novo-banco" placeholder="Nome do Banco">
                        <button class="botao" style="background:#334155" onclick="addBanco()">+ Adicionar Banco</button>
                    </div>
                </aside>
                
                <section style="overflow:hidden">
                    <div class="charts-wrapper" id="container-graficos"></div>
                    <div class="card history-list" id="lista-financas"></div>
                </section>
            </div>
        </div>

        <div id="view-fixas" class="view">
            <div class="grid-layout">
                <div class="card">
                    <h3>Cadastrar Fixa</h3>
                    <input type="text" id="fixa-nome" placeholder="Ex: Aluguel">
                    <input type="number" id="fixa-valor" placeholder="R$ 0,00">
                    <label style="font-size: 10px; opacity: 0.6;">Data Vencimento:</label>
                    <input type="date" id="fixa-vencimento">
                    <button class="botao" style="background:var(--success)" onclick="addContaFixa()">Salvar Conta</button>
                    
                    <div class="card" style="margin-top: 20px; background: rgba(255,255,255,0.03);">
                        <h4 style="margin:0">Total em Fixas</h4>
                        <p id="resumo-fixas" style="font-size: 20px; font-weight: 800; color: var(--danger); margin: 5px 0 0 0;">R$ 0,00</p>
                    </div>
                </div>
                <div class="card" style="overflow-y: auto;">
                    <h3>Histórico de Contas Fixas</h3>
                    <div id="lista-fixas"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgUHntWb0V0l6MoHJVxDMs5sstPSaH-lc",
            authDomain: "sistema-bernardo-1999.firebaseapp.com",
            projectId: "sistema-bernardo-1999",
            storageBucket: "sistema-bernardo-1999.firebasestorage.app",
            messagingSenderId: "1071659920638",
            appId: "1:1071659920638:web:f8843b1886ff698acf49af",
            databaseURL: "https://sistema-bernardo-1999-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userLogado = "", dados = {};

        function fazerLogin() {
            const u = document.getElementById('usuario').value.toLowerCase().trim();
            const s = document.getElementById('senha').value;
            db.ref('/').once('value', snap => {
                dados = snap.val() || {};
                if (dados.usuarios && dados.usuarios[u] && dados.usuarios[u].senha === s) {
                    userLogado = u;
                    document.getElementById('tela-auth').style.display = "none";
                    document.getElementById('nav-app').style.display = "flex";
                    document.getElementById('main-app').style.display = "block";
                    document.getElementById('f-data').valueAsDate = new Date();
                    db.ref('/').on('value', s => { dados = s.val(); renderTudo(); });
                } else { alert("Acesso negado."); }
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+t).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addGasto() {
            const l = document.getElementById('f-local').value, v = parseFloat(document.getElementById('f-valor').value);
            const p = document.getElementById('f-pessoa').value || "Eu";
            const par = document.getElementById('check-parcela').checked ? parseInt(document.getElementById('f-qtd-parcelas').value) : 1;
            const c = document.getElementById('f-cartao-select').value;
            const d = document.getElementById('f-data').value;
            if(!l || isNaN(v)) return;
            let list = dados.usuarios[userLogado].financas || [];
            list.push({ local: l, valor: v, pessoa: p, parcelas: par, cartao: c, data: d });
            db.ref(`usuarios/${userLogado}/financas`).set(list);
            document.getElementById('f-local').value = ""; document.getElementById('f-valor').value = "";
        }

        function addContaFixa() {
            const n = document.getElementById('fixa-nome').value, v = parseFloat(document.getElementById('fixa-valor').value);
            const venc = document.getElementById('fixa-vencimento').value;
            if(!n || isNaN(v) || !venc) return;
            let list = dados.usuarios[userLogado].fixas || [];
            list.push({ nome: n, valor: v, vencimento: venc });
            db.ref(`usuarios/${userLogado}/fixas`).set(list);
            document.getElementById('fixa-nome').value = ""; document.getElementById('fixa-valor').value = "";
        }

        function addBanco() {
            const n = document.getElementById('novo-banco').value.trim();
            if(!n) return;
            let b = dados.usuarios[userLogado].cartoes || [];
            b.push(n); db.ref(`usuarios/${userLogado}/cartoes`).set(b);
            document.getElementById('novo-banco').value = "";
        }

        function delGasto(i) { if(confirm('Excluir gasto?')) { let f = [...dados.usuarios[userLogado].financas]; f.splice(i,1); db.ref(`usuarios/${userLogado}/financas`).set(f); } }
        function delFixa(i) { if(confirm('Excluir conta fixa?')) { let f = [...dados.usuarios[userLogado].fixas]; f.splice(i,1); db.ref(`usuarios/${userLogado}/fixas`).set(f); } }
        
        function editarGasto(i) {
            const atual = dados.usuarios[userLogado].financas[i];
            const novo = prompt(`Novo valor para ${atual.local}:`, atual.valor);
            if(novo !== null && !isNaN(novo)) {
                let f = [...dados.usuarios[userLogado].financas];
                f[i].valor = parseFloat(novo);
                db.ref(`usuarios/${userLogado}/financas`).set(f);
            }
        }

        function editarSaldoMensal() { 
            const n = prompt("Definir novo Saldo Mensal:", dados.usuarios[userLogado].saldoMensal); 
            if(n && !isNaN(n)) db.ref(`usuarios/${userLogado}/saldoMensal`).set(parseFloat(n)); 
        }

        function renderTudo() {
            const user = dados.usuarios[userLogado];
            if(!user) return;
            let tG = 0, tF = 0, alertas = "";
            const hoje = new Date();

            (user.financas || []).forEach(g => tG += g.valor);
            (user.fixas || []).forEach(f => {
                tF += f.valor;
                const dv = new Date(f.vencimento + "T12:00:00");
                const diff = (dv - hoje) / (1000 * 60 * 60 * 24);
                if(diff <= 10 && diff >= -1) alertas += `<li><strong>${f.nome}</strong> vence dia ${dv.toLocaleDateString('pt-BR')}</li>`;
            });

            document.getElementById('alertas-vencimento').style.display = alertas ? "block" : "none";
            document.getElementById('lista-alertas').innerHTML = alertas;
            document.getElementById('h-saldo-total').innerText = `R$ ${(user.saldoMensal || 0).toFixed(2)}`;
            document.getElementById('resumo-fixas').innerText = `R$ ${tF.toFixed(2)}`;
            
            const sobra = (user.saldoMensal || 0) - tG - tF;
            const sEl = document.getElementById('h-sobra');
            sEl.innerText = `R$ ${sobra.toFixed(2)}`;
            sEl.style.color = sobra < 0 ? 'var(--danger)' : 'var(--success)';

            const cG = document.getElementById('container-graficos'); cG.innerHTML = "";
            const bancos = user.cartoes || ['Nubank'];
            document.getElementById('f-cartao-select').innerHTML = bancos.map(b => `<option value="${b}">${b}</option>`).join('');

            bancos.forEach(b => {
                const gastosB = (user.financas || []).filter(g => g.cartao === b);
                if(gastosB.length === 0) return;
                const res = {}; gastosB.forEach(g => res[g.local] = (res[g.local] || 0) + g.valor);
                const div = document.createElement('div');
                div.className = 'chart-container';
                div.innerHTML = `<h5 style="margin:0; font-size:10px">${b}</h5><canvas id="c-${b}"></canvas>`;
                cG.appendChild(div);
                new Chart(document.getElementById(`c-${b}`), {
                    type: 'doughnut',
                    data: { labels: Object.keys(res), datasets: [{ data: Object.values(res), backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#a855f7'], borderWidth: 0 }] },
                    options: { plugins: { legend: { display: false } }, cutout: '70%', maintainAspectRatio: false }
                });
            });

            document.getElementById('lista-financas').innerHTML = (user.financas || []).map((g, i) => `
                <div class="gasto-item">
                    <span><b>${g.cartao}</b> | ${g.local} <small style="opacity:0.5">(${g.pessoa})</small> ${g.parcelas > 1 ? `<br><small style="color:var(--warning)">Parcela: R$ ${g.valor.toFixed(2)} (x${g.parcelas})</small>` : ''}</span>
                    <div>
                        <b style="color:var(--primary)">R$ ${g.valor.toFixed(2)}</b>
                        <button class="btn-icon" onclick="editarGasto(${i})">✎</button>
                        <button class="btn-icon" style="color:var(--danger)" onclick="delGasto(${i})">✕</button>
                    </div>
                </div>`).reverse().join('');

            document.getElementById('lista-fixas').innerHTML = (user.fixas || []).map((f, i) => `
                <div class="gasto-item">
                    <span>${f.nome} <br><small style="opacity:0.5">Vencimento: ${new Date(f.vencimento + "T12:00:00").toLocaleDateString('pt-BR')}</small></span>
                    <div>
                        <b style="color:var(--danger)">R$ ${f.valor.toFixed(2)}</b>
                        <button class="btn-icon" style="color:var(--danger)" onclick="delFixa(${i})">✕</button>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
